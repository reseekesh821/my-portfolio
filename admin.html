<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard – Rishi</title>
  <style>
    :root {
  --bg: #0b1020;
  --surface: #141a2a;
  --surface-soft: #181f33;
  --accent: #4f46e5;
  --accent-soft: rgba(79, 70, 229, 0.16);
  --accent-strong: rgba(79, 70, 229, 0.45);
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-subtle: #272b3d;
  --danger: #ef4444;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  max-width: 1100px;
  margin: 24px auto;
  padding: 16px 20px 40px;
  background: radial-gradient(circle at top, rgba(79,70,229,0.25), transparent 55%), var(--bg);
  color: var(--text-main);
}

h1 {
  margin-top: 0;
  margin-bottom: 12px;
  font-size: 1.8rem;
  letter-spacing: -0.02em;
}

h2 {
  margin-top: 24px;
  margin-bottom: 8px;
  font-size: 1.1rem;
}

.token-area {
  margin-bottom: 20px;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.token-area label {
  font-size: 0.9rem;
  color: var(--text-muted);
}

input[type="password"] {
  width: 260px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border-subtle);
  background: var(--surface-soft);
  color: var(--text-main);
  font-size: 0.9rem;
}

input[type="password"]:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-soft);
}

button {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  background: var(--accent);
  color: white;
  transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
}

button:hover {
  background: #4338ca;
  box-shadow: 0 6px 18px var(--accent-strong);
  transform: translateY(-1px);
}

button:active {
  transform: translateY(0);
  box-shadow: none;
}

.section-buttons {
  margin-bottom: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.section-buttons button {
  background: var(--surface-soft);
  color: var(--text-main);
  border-color: var(--border-subtle);
}

.section-buttons button:hover {
  background: var(--accent-soft);
  border-color: var(--accent);
}

#status {
  font-size: 0.8rem;
  color: var(--text-muted);
}

#section-title {
  margin-top: 16px;
  font-weight: 600;
}

#results {
  margin-top: 8px;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border-subtle);
  padding: 10px 12px;
  overflow: auto;
  max-height: calc(100vh - 220px);
}

/* Tables */

table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.8rem;
}

th,
td {
  border-bottom: 1px solid #1f2435;
  padding: 6px 8px;
  text-align: left;
  vertical-align: top;
}

th {
  position: sticky;
  top: 0;
  background: #151a29;
  z-index: 1;
  color: var(--text-muted);
  font-weight: 600;
}

tr:nth-child(even) td {
  background: rgba(15, 23, 42, 0.35);
}

tr:hover td {
  background: rgba(30, 64, 175, 0.25);
}

/* Action buttons in table */
.actions-cell { white-space: nowrap; }
.actions-cell button { padding: 4px 10px; font-size: 0.75rem; margin-right: 4px; }
.actions-cell button.delete-btn { background: var(--danger); color: white; }
.actions-cell button.delete-btn:hover { background: #dc2626; }

/* Add row button above table */
.add-row-wrap { margin-bottom: 10px; }
.add-row-wrap button { background: var(--surface-soft); color: var(--text-main); border: 1px solid var(--border-subtle); }
.add-row-wrap button:hover { background: var(--accent-soft); border-color: var(--accent); }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  padding: 20px;
  max-width: 420px;
  width: 100%;
  max-height: 90vh;
  overflow: auto;
}
.modal h3 { margin: 0 0 14px; font-size: 1rem; }
.modal label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: var(--text-muted); }
.modal input, .modal textarea {
  width: 100%;
  padding: 8px 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid var(--border-subtle);
  background: var(--surface-soft);
  color: var(--text-main);
  font-size: 0.9rem;
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal-actions { margin-top: 16px; display: flex; gap: 8px; }
.modal-actions button.secondary { background: var(--surface-soft); color: var(--text-main); border: 1px solid var(--border-subtle); }

/* Text + code */

pre {
  font-size: 0.8rem;
  background: var(--surface-soft);
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border-subtle);
  overflow-x: auto;
}

/* Small screens */

@media (max-width: 640px) {
  body {
    margin: 12px auto;
    padding: 10px 12px 24px;
  }

  .token-area {
    flex-direction: column;
    align-items: flex-start;
  }

  input[type="password"] {
    width: 100%;
  }

  #results {
    max-height: none;
  }
}
  </style>
</head>
<body>
  <h1>Admin Dashboard</h1>

  <div class="token-area">
    <label>
      Admin token:
      <input type="password" id="admin-token-input" />
    </label>
    <button id="save-token-btn">Use token</button>
    <span id="status"></span>
  </div>

  <div class="section-buttons">
    <button data-endpoint="/api/admin/contact-messages">Load contact messages</button>
    <button data-endpoint="/api/admin/chat-logs">Load chat logs</button>
    <button data-endpoint="/api/admin/tab-events">Load tab events</button>
    <button data-endpoint="/api/admin/quiz-results">Load quiz results</button>
  </div>

  <h2 id="section-title"></h2>
  <div id="add-row-wrap" class="add-row-wrap" style="display: none;">
    <button type="button" id="add-row-btn">Add row</button>
  </div>
  <div id="results"></div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <h3 id="edit-modal-title">Edit row</h3>
      <form id="edit-form"></form>
      <div class="modal-actions">
        <button type="button" id="edit-cancel-btn" class="secondary">Cancel</button>
        <button type="submit" form="edit-form" id="edit-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Add row modal (contact messages only) -->
  <div id="add-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <h3>Add contact message</h3>
      <form id="add-form">
        <label>Name <input type="text" name="name" required /></label>
        <label>Email <input type="email" name="email" required /></label>
        <label>Message (10–500 characters) <textarea name="message" required minlength="10" maxlength="500" placeholder="At least 10, at most 500 characters"></textarea></label>
      </form>
      <div class="modal-actions">
        <button type="button" id="add-cancel-btn" class="secondary">Cancel</button>
        <button type="submit" form="add-form" id="add-save-btn">Add</button>
      </div>
    </div>
  </div>

  <script>
    let adminToken = '';
    let currentEndpoint = '';
    let currentLabel = '';

    const statusEl = document.getElementById('status');
    const tokenInput = document.getElementById('admin-token-input');
    const addRowWrap = document.getElementById('add-row-wrap');
    const editModal = document.getElementById('edit-modal');
    const editForm = document.getElementById('edit-form');
    const addModal = document.getElementById('add-modal');
    const addForm = document.getElementById('add-form');

    document.getElementById('save-token-btn').addEventListener('click', () => {
      adminToken = tokenInput.value.trim();
      if (adminToken) {
        statusEl.textContent = 'Token set (not saved anywhere).';
      } else {
        statusEl.textContent = 'Token cleared.';
      }
    });

    // Editable fields per endpoint (field name -> type: 'text' | 'textarea' | 'number')
    const editSchemas = {
      '/api/admin/contact-messages': [
        { key: 'name', type: 'text', label: 'Name' },
        { key: 'email', type: 'text', label: 'Email' },
        { key: 'message', type: 'textarea', label: 'Message' }
      ],
      '/api/admin/chat-logs': [
        { key: 'role', type: 'text', label: 'Role' },
        { key: 'content', type: 'textarea', label: 'Content' }
      ],
      '/api/admin/tab-events': [
        { key: 'tab_id', type: 'text', label: 'Tab ID' },
        { key: 'event_type', type: 'text', label: 'Event type' }
      ],
      '/api/admin/quiz-results': [
        { key: 'score', type: 'number', label: 'Score' },
        { key: 'total_questions', type: 'number', label: 'Total questions' }
      ]
    };

    function authHeaders() {
      return { Authorization: 'Bearer ' + adminToken, 'Content-Type': 'application/json' };
    }

    function refreshCurrent() {
      if (currentEndpoint && currentLabel) loadEndpoint(currentEndpoint, currentLabel);
    }

    function buildEditForm(row) {
      const schema = editSchemas[currentEndpoint];
      if (!schema) return;
      editForm.innerHTML = '';
      for (const { key, type, label } of schema) {
        const lab = document.createElement('label');
        lab.textContent = label + ' ';
        const input = type === 'textarea'
          ? document.createElement('textarea')
          : document.createElement('input');
        input.name = key;
        input.type = type;
        input.value = row[key] ?? '';
        if (type === 'textarea') {
          input.rows = 3;
          if (key === 'message') {
            input.minLength = 10;
            input.maxLength = 500;
            lab.textContent = label + ' (10–500 characters) ';
          }
        }
        lab.appendChild(input);
        editForm.appendChild(lab);
      }
    }

    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const schema = editSchemas[currentEndpoint];
      if (!schema) return;
      const rowId = editForm.dataset.editId;
      if (!rowId) return;
      const body = { id: Number(rowId) };
      for (const { key } of schema) {
        const el = editForm.elements[key];
        if (el) body[key] = el.type === 'number' ? Number(el.value) : el.value;
      }
      try {
        const res = await fetch(currentEndpoint, {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Update failed');
          return;
        }
        editModal.classList.remove('visible');
        editModal.setAttribute('aria-hidden', 'true');
        refreshCurrent();
      } catch (err) {
        console.error(err);
        alert('Request failed');
      }
    });

    document.getElementById('edit-cancel-btn').addEventListener('click', () => {
      editModal.classList.remove('visible');
      editModal.setAttribute('aria-hidden', 'true');
    });

    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = {
        name: addForm.elements.name.value.trim(),
        email: addForm.elements.email.value.trim(),
        message: addForm.elements.message.value.trim()
      };
      try {
        const res = await fetch(currentEndpoint, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.error || 'Add failed');
          return;
        }
        addModal.classList.remove('visible');
        addModal.setAttribute('aria-hidden', 'true');
        addForm.reset();
        refreshCurrent();
      } catch (err) {
        console.error(err);
        alert('Request failed');
      }
    });

    document.getElementById('add-cancel-btn').addEventListener('click', () => {
      addModal.classList.remove('visible');
      addModal.setAttribute('aria-hidden', 'true');
    });

    document.getElementById('add-row-btn').addEventListener('click', () => {
      addModal.classList.add('visible');
      addModal.setAttribute('aria-hidden', 'false');
    });

    async function loadEndpoint(endpoint, label) {
      if (!adminToken) {
        alert('Set your admin token first.');
        return;
      }
      currentEndpoint = endpoint;
      currentLabel = label;

      document.getElementById('section-title').textContent = label;
      const resultsEl = document.getElementById('results');
      resultsEl.textContent = 'Loading…';
      addRowWrap.style.display = 'none';

      try {
        const res = await fetch(endpoint, { headers: authHeaders() });

        if (res.status === 401) {
          resultsEl.textContent = '';
          statusEl.textContent = 'Unauthorized – check your admin token.';
          return;
        }

        const data = await res.json();

        if (!Array.isArray(data)) {
          resultsEl.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
          return;
        }

        if (data.length === 0) {
          resultsEl.textContent = 'No rows.';
          if (endpoint === '/api/admin/contact-messages') {
            addRowWrap.style.display = 'block';
          }
          return;
        }

        const keys = Object.keys(data[0]);
        let html = '<table><thead><tr>';
        for (const k of keys) html += '<th>' + escapeHtml(k) + '</th>';
        html += '<th>Actions</th></tr></thead><tbody>';

        for (const row of data) {
          html += '<tr>';
          for (const k of keys) {
            html += '<td>' + escapeHtml(String(row[k] ?? '')) + '</td>';
          }
          html += '<td class="actions-cell">';
          html += '<button type="button" class="edit-row-btn" data-id="' + escapeAttr(row.id) + '" data-row="' + escapeAttr(JSON.stringify(row)) + '">Edit</button>';
          html += '<button type="button" class="delete-row-btn" data-id="' + escapeAttr(row.id) + '">Delete</button>';
          html += '</td></tr>';
        }
        html += '</tbody></table>';
        resultsEl.innerHTML = html;

        if (endpoint === '/api/admin/contact-messages') {
          addRowWrap.style.display = 'block';
        }

        resultsEl.querySelectorAll('.edit-row-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const row = JSON.parse(btn.getAttribute('data-row'));
            editForm.dataset.editId = row.id;
            document.getElementById('edit-modal-title').textContent = 'Edit row';
            buildEditForm(row);
            editModal.classList.add('visible');
            editModal.setAttribute('aria-hidden', 'false');
          });
        });

        resultsEl.querySelectorAll('.delete-row-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Delete this row?')) return;
            const id = btn.getAttribute('data-id');
            try {
              const res = await fetch(currentEndpoint + '?id=' + encodeURIComponent(id), {
                method: 'DELETE',
                headers: authHeaders()
              });
              const out = await res.json();
              if (!res.ok) {
                alert(out.error || 'Delete failed');
                return;
              }
              refreshCurrent();
            } catch (err) {
              console.error(err);
              alert('Request failed');
            }
          });
        });
      } catch (err) {
        console.error(err);
        resultsEl.textContent = 'Error loading data.';
      }
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeAttr(s) {
      return escapeHtml(String(s)).replace(/"/g, '&quot;');
    }

    document.querySelectorAll('.section-buttons button').forEach(btn => {
      btn.addEventListener('click', () => {
        const endpoint = btn.getAttribute('data-endpoint');
        const label = btn.textContent;
        loadEndpoint(endpoint, label);
      });
    });
  </script>
</body>
</html>
